openapi: 3.0.0
info:
  title: CLA API
  description: API documentation for the role-based Rails application.
  version: 1.0.0

servers:
  - url: /api/v1
    description: server

paths:
  /auth/login:
    post:
      summary: User Login
      description: Authenticates a user and returns a token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required:
                - email
                - password
      responses:
        "200":
          description: Successful login
        "401":
          description: Unauthorized

  /auth/register:
    post:
      summary: User Registration
      description: Registers a new user.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
                password_confirmation:
                  type: string
                name:
                  type: string
                cla_role_id:
                  type: integer
                cla_cohort_id:
                  type: integer
              required:
                - email
                - password
                - password_confirmation
                - name
                - cla_role_id
      responses:
        "201":
          description: User created successfully
        "409":
          description: Email already exists
        "422":
          description: Unprocessable entity

  /cla_roles:
    get:
      summary: Get all roles
      description: Returns a list of all roles.
      responses:
        "200":
          description: List of roles

    post:
      summary: Create a role
      description: Admins can create new roles.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
              required:
                - name
      responses:
        "201":
          description: Role created successfully
        "422":
          description: Unprocessable entity

  /cla_roles/{id}:
    get:
      summary: Get a role by ID
      description: Returns a specific role.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Role details

    put:
      summary: Update a role
      description: Admins can update roles.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        "200":
          description: Role updated successfully
        "422":
          description: Unprocessable entity

    delete:
      summary: Delete a role
      description: Admins can delete roles.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Role deleted successfully

  /cla_submissions:
    get:
      summary: Get all submissions
      description: Returns a list of submissions, optionally filtered by user ID.
      parameters:
        - name: cla_user_id
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of submissions

    post:
      summary: Create a submission
      description: Students can submit assignments.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
                cla_assignment_id:
                  type: integer
                cla_user_id:
                  type: integer
              required:
                - content
                - cla_assignment_id
                - cla_user_id
      responses:
        "201":
          description: Submission created successfully
        "422":
          description: Unprocessable entity

  /cla_submissions/{id}:
    put:
      summary: Update a submission
      description: Students can update their submissions.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content:
                  type: string
      responses:
        "200":
          description: Submission updated successfully
        "422":
          description: Unprocessable entity

    delete:
      summary: Delete a submission
      description: Students can delete their submissions.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Submission deleted successfully

  /cla_topics:
    post:
      summary: Create a topic
      description: Facilitators can create topics.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                cla_course_id:
                  type: integer
              required:
                - name
                - description
                - cla_course_id
      responses:
        "201":
          description: Topic created successfully
        "422":
          description: Unprocessable entity

  /cla_topics/{id}:
    put:
      summary: Update a topic
      description: Facilitators can update topics.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        "200":
          description: Topic updated successfully
        "422":
          description: Unprocessable entity

    delete:
      summary: Delete a topic
      description: Facilitators can delete topics.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Topic deleted successfully

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
